name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest pytest-mock

      - name: Lint with flake8
        run: |
          flake8 . \
            --max-line-length=100 \
            --exclude=venv,chroma_db,__pycache__ \
            --ignore=E501,W503

      - name: Check imports resolve
        run: |
          python -c "from config import config; print('config OK')"
          python -c "from pipeline.chunker import TextChunker; print('chunker OK')"
          python -c "from pipeline.embedder import Embedder; print('embedder OK')"
          python -c "from ingest.codebase_loader import CodebaseLoader; print('codebase_loader OK')"
          python -c "from ingest.test_results_loader import TestResultsLoader; print('test_results_loader OK')"

      - name: Run unit tests
        run: |
          pytest tests/ -v --tb=short
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          JIRA_URL: "https://mock.atlassian.net"
          JIRA_TOKEN: "mock_token"
          CONFLUENCE_URL: "https://mock.atlassian.net"
          CONFLUENCE_TOKEN: "mock_token"

  api-check:
    name: API Startup Check
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify FastAPI app loads
        run: |
          python -c "
          import os
          os.environ['ANTHROPIC_API_KEY'] = 'test'
          os.environ['JIRA_URL'] = 'https://mock.atlassian.net'
          os.environ['JIRA_TOKEN'] = 'mock'
          os.environ['CONFLUENCE_URL'] = 'https://mock.atlassian.net'
          os.environ['CONFLUENCE_TOKEN'] = 'mock'
          from api.main import app
          print('FastAPI app loaded OK')
          "
